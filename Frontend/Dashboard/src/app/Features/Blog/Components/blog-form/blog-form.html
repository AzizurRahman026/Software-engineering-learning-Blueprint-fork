<div class="form-container">
  <h2>{{ isEditing ? 'Edit Blog' : 'Write a Blog' }}</h2>

  @if (errorMessage) {
    <div class="error-banner">{{ errorMessage }}</div>
  }

  <form (ngSubmit)="submit()">
    <div class="form-group">
      <label for="title">Title</label>
      <input id="title" name="title" type="text" class="form-control"
             [(ngModel)]="form.title" required placeholder="An informative title…">
    </div>

    <div class="form-group">
      <label for="summary">Summary <span class="optional">(optional)</span></label>
      <input id="summary" name="summary" type="text" class="form-control"
             [(ngModel)]="form.summary" placeholder="Short excerpt shown in the list…">
    </div>

    <div class="form-group">
      <label>Content <span class="optional">(Markdown supported)</span></label>
      <div class="editor-grid">
        <textarea id="content" name="content" class="form-control editor"
                  [(ngModel)]="form.content" rows="18"
                  placeholder="Write your blog in Markdown…"></textarea>
        <div class="preview">
          @if (previewHtml) {
            <div class="markdown-body" [innerHTML]="previewHtml"></div>
          } @else {
            <p class="preview-placeholder">Live preview appears here.</p>
          }
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">{{ isEditing ? 'Update' : 'Publish' }}</button>
      <button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button>
    </div>
  </form>
</div>
