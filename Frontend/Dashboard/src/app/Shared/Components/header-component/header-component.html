<header class="header">
  <!-- Logo -->
  <div class="logo">
    <a class="tech-link logo-link" routerLink="">
      <span>📮 Dispatch</span>
    </a>
  </div>

  <!-- Primary nav -->
  <nav class="main-nav">
    <a class="tech-link" routerLink="/posts">Posts</a>
    @if (authService.currentUser()) {
      <a class="tech-link" routerLink="/posts/mine">My Posts</a>
      <a class="tech-link" routerLink="/posts/create">Write</a>
    }
    @if (authService.isAdmin()) {
      <a class="tech-link" routerLink="/admin">Admin</a>
    }
    <a class="tech-link" routerLink="/" fragment="subscribe">Subscribe</a>
  </nav>

  <!-- Auth area -->
  <div class="auth-buttons">
    @if (authService.currentUser(); as user) {
      <div #profileMenu class="profile-menu">
        <button type="button"
                class="profile-trigger"
                (click)="toggleProfileMenu($event)"
                [attr.aria-expanded]="profileMenuOpen"
                aria-haspopup="menu"
                aria-label="Open profile menu">
          <span class="avatar-circle">{{ userInitial }}</span>
        </button>

        @if (profileMenuOpen) {
          <div class="profile-dropdown" role="menu" (click)="$event.stopPropagation()">
            <div class="dropdown-header">
              <span class="dropdown-name">{{ user.username }}</span>
              <span class="dropdown-email">{{ user.email }}</span>
            </div>
            <a class="dropdown-item"
               role="menuitem"
               routerLink="/profile"
               (click)="closeProfileMenu()">
              <span class="item-icon">👤</span>
              <span>View Profile</span>
            </a>
            <button type="button" class="dropdown-item danger" role="menuitem" (click)="logout()">
              <span class="item-icon">⎋</span>
              <span>Logout</span>
            </button>
          </div>
        }
      </div>
    } @else {
      <button type="button" class="auth-button" (click)="openAuthModal('login')">Sign In</button>
      <button type="button" class="auth-button" (click)="openAuthModal('signup')">Sign Up</button>
    }
  </div>
</header>
