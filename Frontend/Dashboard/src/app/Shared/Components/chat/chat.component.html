<div class="chat-wrapper" [class.open]="isOpen">
  <!-- Chat Window -->
  <div class="chat-window shadow-premium">
    <div class="chat-header">
      <div class="ai-info">
        <div class="ai-avatar">AI</div>
        <div class="ai-details">
          <span class="ai-name">Learning Assistant</span>
          <span class="ai-status">Online</span>
        </div>
      </div>
      <button class="close-btn" (click)="toggleChat()">×</button>
    </div>

    <div class="chat-messages" #messagesContainer>
      @for (msg of messages; track msg.time) {
        <div class="message-group" [class.user]="msg.sender === 'user'">
          <div class="message-bubble">
            <div [innerHTML]="formatMessage(msg.text)"></div>
          </div>
          <span class="message-time">{{ msg.time | date:'shortTime' }}</span>
        </div>
      }
      @if (isLoading) {
        <div class="message-group">
          <div class="message-bubble typing">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
        </div>
      }
    </div>

    <div class="chat-footer">
    <div class="chat-footer">
      <div class="input-row">
        <select class="model-select" [(ngModel)]="selectedProvider" [disabled]="isLoading">
          <option [ngValue]="0">Gemini</option>
          <option [ngValue]="1">Claude</option>
        </select>
        <input 
          type="text" 
          [(ngModel)]="newMessage" 
          (keyup.enter)="sendMessage()"
          [disabled]="isLoading"
          placeholder="Ask me a question..."
        >
        <button class="send-btn" (click)="sendMessage()" [disabled]="isLoading || !newMessage.trim()">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
    </div>
  </div>

  <!-- Floating Toggle Button -->
  <button class="chat-toggle shadow-premium" (click)="toggleChat()" [class.active]="isOpen">
    @if (!isOpen) {
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M21 11.5C21.0034 12.8199 20.6951 14.1219 20.1 15.3C19.3944 16.7118 18.3098 17.8992 16.9674 18.7293C15.6251 19.5594 14.0782 19.9994 12.5 20C11.1801 20.0035 9.87812 19.6951 8.7 19.1L3 21L4.9 15.3C4.30493 14.1219 3.99656 12.8199 4 11.5C4.00061 9.92179 4.44061 8.37488 5.27072 7.03258C6.10083 5.69028 7.28825 4.6056 8.7 3.90003C9.87812 3.30496 11.1801 2.99659 12.5 3.00003H13C15.0843 3.11502 17.053 3.99479 18.5291 5.47089C20.0052 6.94699 20.885 8.91568 21 11V11.5Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    } @else {
      <span class="close-icon">↓</span>
    }
  </button>
</div>
